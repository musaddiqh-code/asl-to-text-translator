<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sign Language AI</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
}

video {
    width: 400px;
    height: 300px;
    border-radius: 12px;
    margin-top: 20px;
    background: black;
}

#word { font-size: 28px; color: #00ffcc; }
#sentence { font-size: 20px; color: #ccc; }

button {
    margin: 10px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #00c6ff;
    color: white;
}
</style>
</head>

<body>

<h2>🖐️ Smart Sign Translator</h2>

<video id="video" autoplay playsinline></video>

<p>Current: <span id="current">-</span></p>
<p id="word">Word: </p>
<p id="sentence">Sentence: </p>

<button onclick="addSpace()">Space</button>
<button onclick="clearAll()">Clear</button>

<script>
const video = document.getElementById("video");

let currentWord = "";
let sentence = "";

// smoothing
let history = [];
const MAX_HISTORY = 5;

// stability
let lastStable = "";
let holdStart = null;
const HOLD_TIME = 1500;

// ✅ Start camera safely
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    console.error("Camera error:", err);
    alert("Camera access denied or not working");
});

// ✅ Wait until video is ready before starting loop
video.onloadedmetadata = () => {
    setInterval(capture, 700);
};

// 🔥 Capture function
async function capture() {

    if (video.videoWidth === 0) return;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(async function(blob) {

        const formData = new FormData();
        formData.append("file", blob, "frame.jpg");

        try {
            const res = await fetch("http://127.0.0.1:8001/predict-image", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            const pred = data.prediction;
            const conf = data.confidence || 0;

            document.getElementById("current").innerText =
                pred + " (" + conf + ")";

            // ❌ ignore weak predictions
            if (conf < 0.7) return;
            if (pred.length !== 1) return;

            // 🔥 smoothing
            history.push(pred);
            if (history.length > MAX_HISTORY) history.shift();

            const stable = mostFrequent(history);

            // 🔥 hold detection
            if (stable === lastStable) {

                if (!holdStart) holdStart = Date.now();

                let heldTime = Date.now() - holdStart;

                if (heldTime > HOLD_TIME) {
                    currentWord += stable;

                    lastStable = stable + "_done";
                    holdStart = null;
                    history = [];
                }

            } else {
                lastStable = stable;
                holdStart = Date.now();
            }

            updateUI();

        } catch (e) {
            console.error("API error:", e);
        }

    }, "image/jpeg");
}

// helper
function mostFrequent(arr) {
    return arr.sort((a,b) =>
        arr.filter(v=>v===a).length -
        arr.filter(v=>v===b).length
    ).pop();
}

// UI actions
function addSpace() {
    if (currentWord.length > 0) {
        sentence += currentWord + " ";
        currentWord = "";
    }
    updateUI();
}

function clearAll() {
    currentWord = "";
    sentence = "";
    updateUI();
}

function updateUI() {
    document.getElementById("word").innerText =
        "Word: " + currentWord;

    document.getElementById("sentence").innerText =
        "Sentence: " + sentence;
}
</script>

</body>
</html>
